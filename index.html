<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Escala</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <section class="hero">
    <div class="hero-header">
      <h1>Escala de Trabalho</h1>
      <button class="btn-config" id="openSettings" type="button" aria-label="Abrir configurações">⚙️</button>
    </div>
    <p class="hero-subtitle">Consulte sua escala.</p>
  </section>

  <div class="quick-actions">
    <button class="btn-google dark" onclick="login()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      <span class="btn-copy">
        <span>Entrar com Google</span>
        <small>Acesse seus dados</small>
      </span>
    </button>

    <label class="upload">
      <span class="upload-icon">📄</span>
      <span class="btn-copy">
        <span class="upload-text">Carregar PDF</span>
        <small id="uploadHint">Toque para importar um ou mais arquivos</small>
      </span>
      <input type="file" id="pdfInput" multiple hidden>
    </label>
  </div>

  <section class="calendar-shell">
    <div class="mes-controle">
      <button onclick="mudarMes(-1)">‹</button>
      <span id="mesAtual"></span>
      <button onclick="mudarMes(1)">›</button>
    </div>

    <div class="week-header">
      <div>DOM</div>
      <div>SEG</div>
      <div>TER</div>
      <div>QUA</div>
      <div>QUI</div>
      <div>SEX</div>
      <div>SAB</div>
    </div>
    <div id="calendar"></div>

  </section>

  <button class="btn-hoje" onclick="irParaHoje()">Ir para hoje</button>

  <div id="lista"></div>

</div>

<div class="settings-modal" id="settingsModal" aria-hidden="true">
  <div class="settings-dialog" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="settings-topo">
      <h2 id="settingsTitle">Configurações</h2>
      <button class="settings-close" id="closeSettings" type="button" aria-label="Fechar configurações">✕</button>
    </div>

    <p class="settings-desc">Ajuste os descontos para calcular os horários automaticamente.</p>

    <div class="settings-grid">
      <div class="settings-row">
        <strong>Descontar da entrada para sair de casa (EGO)</strong>
        <div class="time-inputs">
          <label>Horas <input type="number" id="egoHours" min="0" max="23"></label>
          <label>Minutos <input type="number" id="egoMinutes" min="0" max="59"></label>
        </div>
      </div>

      <div class="settings-row">
        <strong>Descontar da entrada para sair de casa (BAS)</strong>
        <div class="time-inputs">
          <label>Horas <input type="number" id="basHours" min="0" max="23"></label>
          <label>Minutos <input type="number" id="basMinutes" min="0" max="59"></label>
        </div>
      </div>

      <div class="settings-row">
        <strong>Descontar de sair de casa para começar a se arrumar</strong>
        <div class="time-inputs">
          <label>Horas <input type="number" id="arrumarHours" min="0" max="23"></label>
          <label>Minutos <input type="number" id="arrumarMinutes" min="0" max="59"></label>
        </div>
      </div>
    </div>

    <label class="toggle-retroativa" for="applyRetroactive">
      <input type="checkbox" id="applyRetroactive">
      <span>Atualizar também os registros antigos já salvos.</span>
    </label>

    <button class="btn-salvar-config" id="saveSettings" type="button">Confirmar configurações</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

</body>
