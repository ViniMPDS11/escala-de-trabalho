<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Escala</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <section class="hero">
    <h1>Escala de Trabalho</h1>
    <p class="hero-subtitle">Consulte sua escala.</p>
  </section>

  <div class="quick-actions">
    <button class="btn-google dark" onclick="login()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      <span class="btn-copy">
        <span>Entrar com Google</span>
        <small>Acesse seus dados</small>
      </span>
    </button>

    <label class="upload">
      <span class="upload-icon">📄</span>
      <span class="btn-copy">
        <span class="upload-text">Carregar PDF</span>
        <small id="uploadHint">Toque para importar um ou mais arquivos</small>
      </span>
      <input type="file" id="pdfInput" multiple hidden>
    </label>
  </div>

  <p class="legenda">Base 6x2 desde 11/03/2026</p>

  <section class="calendar-shell">
    <div class="mes-controle">
      <button onclick="mudarMes(-1)">‹</button>
      <span id="mesAtual"></span>
      <button onclick="mudarMes(1)">›</button>
    </div>

    <div class="week-header">
      <div>DOM</div>
      <div>SEG</div>
      <div>TER</div>
      <div>QUA</div>
      <div>QUI</div>
      <div>SEX</div>
      <div>SAB</div>
    </div>
    <div id="calendar"></div>

  </section>

  <button class="btn-hoje" onclick="irParaHoje()">Ir para hoje</button>

  <div id="lista"></div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>
